{% extends "base.html" %}

{% block title %}Admin Login - Invariant{% endblock %}

{% block content %}
<section class="auth-page" aria-labelledby="login-title">
    <div class="auth-page__copy">
        <p class="eyebrow">Invariant admin</p>
        <h1 id="login-title">Sign in to publish.</h1>
        <p>Access to post management is restricted to authorized administrators.</p>
    </div>

    <form class="auth-form" method="post" action="/admin/login">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Sign in</button>
    </form>
</section>
{% endblock %}
