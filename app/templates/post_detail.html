{% extends "base.html" %}

{% block title %}{{ post.title }} — Blog{% endblock %}

{% block content %}
<article>
    <h2>{{ post.title }}</h2>
    <p><small>Published: {{ post.published_at.strftime('%Y-%m-%d') }}</small></p>
    <div>{{ post.markdown_content }}</div>
</article>
<p><a href="/">← Back to posts</a></p>
{% endblock %}
