{% extends "base.html" %}

{% block title %}{{ post.title }} - Invariant{% endblock %}

{% block content %}
<article class="post-detail">
    <header class="post-detail__header">
        <p class="eyebrow">Article</p>
        <h1>{{ post.title }}</h1>
        <p class="post-detail__meta">
            {{ post.published_at.strftime('%b %d, %Y') if post.published_at else 'Recent' }}
        </p>
    </header>

    <div class="post-detail__media" aria-hidden="true"></div>

    <section class="post-detail__content" aria-label="Article content">
        <p class="post-detail__lede">{{ post.excerpt }}</p>

        <div class="post-body">
            {{ rendered_content | safe }}
        </div>
    </section>

    <nav class="article-nav" aria-label="Article navigation">
        <a href="/">Back to all posts</a>
    </nav>
</article>
{% endblock %}
