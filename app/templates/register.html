{% extends "base.html" %}

{% block title %}Create Account - Invariant{% endblock %}

{% block content %}
<section class="auth-page" aria-labelledby="register-title">
    <div class="auth-page__copy">
        <p class="eyebrow">Join Invariant</p>
        <h1 id="register-title">Create your account.</h1>
        <p>Register to publish posts, join conversations, and build your reading profile as the community grows.</p>
    </div>

    <form class="auth-form" method="post" action="/register">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required>

        <button type="submit">Create account</button>
        <p class="auth-page__links">Already registered? <a href="/login">Sign in</a></p>
    </form>
</section>
{% endblock %}
